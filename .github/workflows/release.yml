name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Package extension
        run: |
          cd dist
          zip -r ../md-editor-${{ github.ref_name }}.zip .

      - name: Upload asset and publish release
        run: |
          gh release upload "${{ github.ref_name }}" md-editor-*.zip --clobber
          gh release edit "${{ github.ref_name }}" --draft=false --latest
        env:
          GH_TOKEN: ${{ github.token }}
