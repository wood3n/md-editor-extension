name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../md-editor-${{ github.ref_name }}.zip .

      - name: Generate changelog
        run: npx changelogen --from=latest --output=CHANGELOG-latest.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG-latest.md
          files: md-editor-*.zip
          generate_release_notes: false
